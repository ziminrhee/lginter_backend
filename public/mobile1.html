<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile1 - User Interface</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95em;
    }
    .form-group {
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }
    input[type="text"] {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9em;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 Mobile1</h1>
    <p class="subtitle">환영합니다! 닉네임을 입력해주세요</p>
    
    <form id="nicknameForm">
      <div class="form-group">
        <label for="nickname">닉네임</label>
        <input 
          type="text" 
          id="nickname" 
          name="nickname" 
          placeholder="닉네임을 입력하세요" 
          required
          maxlength="20"
        >
      </div>
      <button type="submit" id="submitBtn">입력 완료</button>
    </form>
    
    <div class="status" id="status"></div>
  </div>

  <script>
    const socket = io();
    const form = document.getElementById('nicknameForm');
    const nicknameInput = document.getElementById('nickname');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    // Generate UUID
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // Show status message
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = 'status ' + type;
      setTimeout(() => {
        statusDiv.style.display = 'none';
      }, 3000);
    }

    // Handle form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const nickname = nicknameInput.value.trim();
      if (!nickname) {
        showStatus('닉네임을 입력해주세요', 'error');
        return;
      }

      // Create data object with UUID and Timestamp
      const data = {
        uuid: generateUUID(),
        timestamp: new Date().toISOString(),
        nickname: nickname,
        clientId: socket.id
      };

      // Emit mobile-new-name event
      socket.emit('mobile-new-name', data);
      
      // Disable button and show success
      submitBtn.disabled = true;
      showStatus('✅ 닉네임이 전송되었습니다!', 'success');
      
      // Re-enable button after 2 seconds
      setTimeout(() => {
        submitBtn.disabled = false;
        nicknameInput.value = '';
      }, 2000);
    });

    // Connection status
    socket.on('connect', () => {
      console.log('Connected to server:', socket.id);
    });

    socket.on('disconnect', () => {
      console.log('Disconnected from server');
      showStatus('서버 연결이 끊어졌습니다', 'error');
    });
  </script>
</body>
</html>
