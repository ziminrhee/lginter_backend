<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBM1 - LG StandByMe Display</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Animated gradient blobs background */
    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.7;
      animation: float 20s infinite ease-in-out;
    }
    
    .blob1 {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      top: -150px;
      left: -100px;
      animation-delay: 0s;
    }
    
    .blob2 {
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ffc3e1 100%);
      top: -200px;
      right: -150px;
      animation-delay: 3s;
    }
    
    .blob3 {
      width: 450px;
      height: 450px;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      bottom: -100px;
      left: 20%;
      animation-delay: 5s;
    }
    
    .blob4 {
      width: 550px;
      height: 550px;
      background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
      bottom: -150px;
      right: -100px;
      animation-delay: 7s;
    }
    
    .blob5 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      top: 50%;
      left: -150px;
      animation-delay: 2s;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -30px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
    }
    
    .container {
      text-align: center;
      padding: 60px 40px;
      position: relative;
      z-index: 10;
      max-width: 600px;
    }
    
    .main-text {
      font-size: 1.8em;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 80px;
      line-height: 1.4;
      letter-spacing: -0.5px;
    }
    
    #qrcode {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 30px;
      display: inline-block;
      margin: 0 auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }
    
    #qrcode:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
    }
    
    .bottom-icon {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .bottom-icon svg {
      width: 28px;
      height: 28px;
      opacity: 0.6;
    }
    
    /* IP Config - minimized and hidden by default */
    .ip-config {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      font-size: 0.85em;
      max-width: 300px;
    }
    
    .ip-config label {
      color: #1d1d1f;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      font-size: 0.9em;
    }
    
    .ip-config input {
      padding: 8px 12px;
      font-size: 0.95em;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 8px;
      font-family: monospace;
    }
    
    .ip-config button {
      padding: 8px 16px;
      font-size: 0.9em;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: background 0.2s;
    }
    
    .ip-config button:hover {
      background: #0051d5;
    }
    
    .current-url {
      font-size: 0.75em;
      margin-top: 8px;
      color: #86868b;
      word-break: break-all;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <!-- Animated gradient background -->
  <div class="gradient-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="blob blob4"></div>
    <div class="blob blob5"></div>
  </div>
  
  <!-- IP Configuration (top right corner) -->
  <div class="ip-config">
    <label>서버 IP 주소</label>
    <input type="text" id="ipInput" placeholder="172.20.10.2" value="172.20.10.2">
    <button onclick="generateQR()">QR 생성</button>
    <div class="current-url" id="currentUrl"></div>
  </div>
  
  <!-- Main content -->
  <div class="container">
    <div class="main-text">
      QR코드 스캔을 통해<br>전시 관람을 시작하세요!
    </div>
    
    <div id="qrcode"></div>
  </div>
  
  <!-- Bottom icon -->
  <div class="bottom-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="16"></line>
      <line x1="8" y1="12" x2="16" y2="12"></line>
    </svg>
  </div>

  <script>
    let qrcode = null;
    
    function generateQR() {
      const ipInput = document.getElementById('ipInput');
      const qrcodeDiv = document.getElementById('qrcode');
      const currentUrlDiv = document.getElementById('currentUrl');
      const ip = ipInput.value.trim();
      
      if (!ip) {
        alert('IP 주소를 입력해주세요!');
        return;
      }
      
      // Build URL with IP address
      const mobile1URL = `http://${ip}:3000/mobile1`;
      console.log('Generating QR code for:', mobile1URL);
      
      // Clear previous QR code
      qrcodeDiv.innerHTML = '';
      
      // Generate new QR code
      try {
        qrcode = new QRCode(qrcodeDiv, {
          text: mobile1URL,
          width: 300,
          height: 300,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        });
        currentUrlDiv.textContent = `URL: ${mobile1URL}`;
        console.log('QR code generated successfully!');
      } catch (error) {
        console.error('QR code generation error:', error);
        qrcodeDiv.innerHTML = '<p style="color: red;">QR 코드 생성 실패</p>';
      }
    }
    
    // Auto-generate on page load
    window.addEventListener('DOMContentLoaded', function() {
      generateQR();
    });
  </script>
</body>
</html>
